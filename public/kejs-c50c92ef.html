<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Кейс · Иосиф Юрьевич</title>

<body>
<style>
:root{
  --forest:#2E4738; --forest-2:#34513F; --forest-3:#3E5D49;
  --earth:#6E4E38; --earth-2:#5A3E2C; --sand:#C9A97C;
  --cream:#F0E9D8; --cream-dim:#CFC7B2; --cream-faint:#A69E88;
  --gold:#DDAB63; --gold-2:#EBC891; --peach:#E7B78E;
  --ink-dark:#3A2E22;
  --panel:rgba(255,255,255,.055); --panel-2:rgba(255,255,255,.09);
  --hair:rgba(240,233,216,.14);
  --shadow:0 22px 46px -18px rgba(12,22,14,.7);
  --radius:26px; --radius-sm:18px;
  --disp:ui-rounded,'SF Pro Rounded','Segoe UI',system-ui,'Manrope',sans-serif;
  --body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); color:var(--cream); -webkit-font-smoothing:antialiased;
  background:
    radial-gradient(120% 75% at 86% -5%, rgba(150,180,130,.22), transparent 55%),
    radial-gradient(110% 90% at 6% 108%, rgba(150,96,58,.30), transparent 58%),
    linear-gradient(158deg,#37543F 0%, #45543C 46%, #5A4030 100%);
  background-attachment:fixed;
  scroll-snap-type:y mandatory; scroll-behavior:smooth; height:100vh; overflow-y:scroll; overflow-x:hidden;
}
body::-webkit-scrollbar{width:0}
.leafdeco{position:fixed; top:-40px; right:-40px; width:min(38vw,440px); z-index:0; opacity:.14; pointer-events:none; transform:rotate(8deg)}
.leafdeco2{position:fixed; bottom:-60px; left:-50px; width:min(26vw,300px); z-index:0; opacity:.09; pointer-events:none; transform:rotate(-18deg)}

.slide{position:relative; z-index:1; min-height:100vh; scroll-snap-align:start; scroll-snap-stop:always;
  display:flex; flex-direction:column; justify-content:center;
  padding:clamp(30px,5vw,72px) clamp(22px,6vw,92px) clamp(58px,7vw,92px);}
.wrap{width:100%; max-width:1180px; margin:0 auto}

/* eyebrow */
.eyebrow{display:flex; align-items:center; gap:13px; margin-bottom:22px}
.eyebrow .n{background:linear-gradient(135deg,var(--gold),var(--peach)); color:var(--earth-2); font-family:var(--disp);
  font-weight:800; font-size:13px; padding:5px 12px; border-radius:99px; letter-spacing:.02em}
.eyebrow .kicker2{font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--gold-2); font-weight:600}
.eyebrow .ln{flex:1; height:1px; background:var(--hair)}
h1.slidetitle{font-family:var(--disp); font-size:clamp(27px,3.7vw,46px); line-height:1.05; font-weight:800;
  letter-spacing:-.015em; margin:0 0 4px; text-wrap:balance; color:var(--cream)}
.subtitle{color:var(--cream-dim); font-size:clamp(14px,1.5vw,18px); max-width:62ch; line-height:1.55}

/* reveal */
.rv{opacity:0; transform:translateY(20px); transition:opacity .65s cubic-bezier(.2,.7,.2,1), transform .65s cubic-bezier(.2,.7,.2,1)}
.slide.active .rv{opacity:1; transform:none; transition-delay:calc(var(--i,0)*80ms)}
@media (prefers-reduced-motion:reduce){.rv{opacity:1!important; transform:none!important; transition:none}}

/* three columns */
.cols{display:grid; grid-template-columns:1fr 1.05fr 1fr; gap:16px; margin-top:26px}
@media(max-width:860px){.cols{grid-template-columns:1fr}}
.col{border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--hair)}
.col.before{background:linear-gradient(165deg, rgba(78,110,88,.5), rgba(46,71,56,.55))}
.col.did{background:linear-gradient(165deg, rgba(110,78,56,.6), rgba(74,50,36,.66))}
.col.after{background:linear-gradient(165deg, rgba(201,169,124,.28), rgba(120,86,48,.32))}
.col .hd{font-family:var(--disp); font-size:12px; letter-spacing:.06em; padding:12px 16px; font-weight:800; color:var(--gold-2)}
.col.before .hd{color:#bcd6c2}
.col ul{list-style:none; margin:0; padding:6px 16px 16px; display:flex; flex-direction:column; gap:11px}
.col li{position:relative; padding-left:17px; font-size:13.5px; line-height:1.45; color:var(--cream)}
.col li::before{content:''; position:absolute; left:0; top:7px; width:7px; height:7px; border-radius:50%; background:var(--gold)}
.col.before li::before{background:#8fbf9c}
.col.did li{padding-left:0; display:flex; gap:10px}
.col.did li::before{display:none}
.col.did .d{font-family:var(--disp); font-size:11.5px; color:var(--gold-2); font-weight:800; min-width:54px; padding-top:1px}

/* metric tiles */
.metrics{display:grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:16px; margin-top:22px}
@media(max-width:860px){.metrics{grid-auto-flow:row}}
.metric{border-radius:var(--radius); background:linear-gradient(160deg, rgba(240,233,216,.14), rgba(240,233,216,.05));
  border:1px solid var(--hair); padding:22px 18px; text-align:center; box-shadow:var(--shadow); position:relative; overflow:hidden}
.metric .big{font-family:var(--disp); font-size:clamp(30px,3.7vw,46px); font-weight:800; color:var(--gold-2);
  line-height:1; letter-spacing:-.01em; font-variant-numeric:tabular-nums}
.metric .lab{color:var(--cream-dim); font-size:12.5px; margin-top:10px; line-height:1.4}
.metric .bar{height:6px; border-radius:99px; background:rgba(240,233,216,.14); margin-top:15px; overflow:hidden}
.metric .bar > i{display:block; height:100%; width:0; border-radius:99px; background:linear-gradient(90deg,#8fbf9c,var(--gold)); transition:width 1.1s cubic-bezier(.2,.7,.2,1) .25s}
.slide.active .metric .bar > i{width:var(--w,100%)}

/* note */
.note{margin-top:18px; display:flex; border-radius:var(--radius-sm); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--hair)}
.note .tag{background:linear-gradient(135deg,var(--gold),var(--peach)); color:var(--earth-2); font-family:var(--disp); font-size:11px;
  letter-spacing:.1em; padding:13px 15px; display:flex; align-items:center; font-weight:800; white-space:nowrap}
.note .txt{padding:13px 17px; color:var(--cream); font-size:13.5px; line-height:1.5; background:rgba(46,71,56,.5)}
.note.accent .tag{background:linear-gradient(135deg,var(--gold),var(--peach))}
.note.accent .txt{font-weight:600}

/* dashboard + icon cards */
.dash{display:grid; grid-template-columns:repeat(5,1fr); gap:15px; margin-top:26px}
@media(max-width:980px){.dash{grid-template-columns:repeat(2,1fr)}}
.card{border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); border:1px solid var(--hair);
  transition:transform .28s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column; gap:11px}
.card:hover{transform:translateY(-5px)}
.card.t0{background:linear-gradient(165deg, rgba(86,122,94,.55), rgba(52,80,63,.62))}
.card.t1{background:linear-gradient(165deg, rgba(110,78,56,.6), rgba(74,50,36,.66))}
.card.t2{background:linear-gradient(165deg, rgba(201,169,124,.3), rgba(150,110,66,.36))}
.ico{width:48px; height:48px; border-radius:50%; display:grid; place-items:center; flex:none;
  background:rgba(240,233,216,.1); border:1px solid rgba(240,233,216,.22)}
.ico svg{width:23px; height:23px; stroke:var(--cream); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round}
.card .cn{font-family:var(--disp); font-weight:800; font-size:15px; color:var(--cream)}
.card .cd{color:var(--cream-dim); font-size:12.5px; line-height:1.45}

/* timeline */
.tl{display:grid; grid-template-columns:1fr 1fr; gap:6px 40px; margin-top:24px}
@media(max-width:860px){.tl{grid-template-columns:1fr}}
.tl .row{display:flex; gap:14px; align-items:baseline; padding:11px 0; border-bottom:1px solid var(--hair)}
.tl .dt{font-family:var(--disp); font-size:14px; color:var(--gold-2); font-weight:800; min-width:56px}
.tl .ev{font-size:14px; color:var(--cream)}

/* deal */
.deal{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:24px}
@media(max-width:860px){.deal{grid-template-columns:1fr}}
.dealcard{border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--hair)}
.dealcard .top{background:linear-gradient(165deg,rgba(110,78,56,.66),rgba(74,50,36,.72)); padding:17px}
.dealcard .lbl{font-family:var(--disp); font-size:10.5px; letter-spacing:.1em; color:var(--gold-2); text-transform:uppercase; font-weight:800}
.dealcard .obj{font-family:var(--disp); font-weight:800; font-size:16px; margin:6px 0 4px; color:var(--cream)}
.dealcard .meta{color:var(--cream-dim); font-size:12.5px}
.aireco{padding:17px; background:linear-gradient(165deg,rgba(201,169,124,.24),rgba(120,86,48,.3))}
.aireco ul{margin:8px 0 0; padding-left:17px; display:flex; flex-direction:column; gap:7px}
.aireco li{font-size:13px; line-height:1.42; color:var(--cream)}
.smeta{border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); border:1px solid var(--hair); background:rgba(46,71,56,.5)}
.smeta .sh{background:linear-gradient(135deg,rgba(110,78,56,.8),rgba(74,50,36,.85)); color:var(--gold-2); font-family:var(--disp); font-size:11px; letter-spacing:.06em; padding:12px 16px; font-weight:800}
.smeta .obj{font-family:var(--disp); font-weight:800; font-size:14.5px; padding:13px 16px 8px; color:var(--cream)}
.smeta .r{display:flex; justify-content:space-between; gap:12px; padding:9px 16px; font-size:13px; border-top:1px solid var(--hair); color:var(--cream-dim)}
.smeta .r .p{font-family:var(--disp); font-weight:800; color:var(--cream); font-variant-numeric:tabular-nums; white-space:nowrap}
.smeta .tot{display:flex; justify-content:space-between; padding:14px 16px; background:linear-gradient(90deg,rgba(221,171,99,.22),rgba(221,171,99,.1)); font-family:var(--disp); font-weight:800; color:var(--cream)}
.smeta .tot .p{color:var(--gold-2); font-size:18px}

/* title */
.brandline{display:flex; align-items:center; gap:14px; margin-bottom:30px}
.mono-badge{background:linear-gradient(140deg,var(--gold),var(--peach)); color:var(--earth-2); font-family:var(--disp); font-weight:800; font-size:20px;
  width:54px; height:54px; display:grid; place-items:center; border-radius:16px}
.brandline .bt{font-family:var(--disp); font-weight:800; font-size:19px; color:var(--cream)}
.brandline .bs{font-size:10.5px; letter-spacing:.18em; color:var(--gold-2); text-transform:uppercase; margin-top:3px; font-weight:600}
.hero-h{font-family:var(--disp); font-size:clamp(34px,6vw,74px); line-height:1.02; font-weight:800; letter-spacing:-.025em; margin:0; color:var(--cream)}
.hero-h .am{color:var(--gold-2)}
.hero-sub{color:var(--cream-dim); font-size:clamp(15px,1.7vw,20px); margin-top:22px; max-width:60ch; line-height:1.55}
.hero-metrics{display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:40px; max-width:840px}
@media(max-width:720px){.hero-metrics{grid-template-columns:1fr}}
.hm{border-radius:var(--radius); padding:24px 18px; text-align:center; box-shadow:var(--shadow); border:1px solid var(--hair)}
.hm:nth-child(1){background:linear-gradient(165deg,rgba(86,122,94,.55),rgba(52,80,63,.62))}
.hm:nth-child(2){background:linear-gradient(165deg,rgba(110,78,56,.6),rgba(74,50,36,.66))}
.hm:nth-child(3){background:linear-gradient(165deg,rgba(201,169,124,.3),rgba(150,110,66,.36))}
.hm .v{font-family:var(--disp); font-size:clamp(30px,4vw,48px); font-weight:800; color:var(--gold-2); line-height:1; font-variant-numeric:tabular-nums}
.hm .l{color:var(--cream-dim); font-size:12.5px; margin-top:11px; line-height:1.4}
.hero-foot{font-size:12.5px; color:var(--cream-faint); margin-top:36px; letter-spacing:.03em}

/* closing */
.close-h{font-family:var(--disp); font-size:clamp(30px,5vw,60px); font-weight:800; letter-spacing:-.02em; line-height:1.05; margin:0; color:var(--cream)}
.close-cta{display:flex; flex-wrap:wrap; gap:16px 40px; align-items:baseline; margin-top:32px; padding-top:26px; border-top:2px solid var(--gold)}
.close-cta .q{font-family:var(--disp); font-size:clamp(18px,2.2vw,26px); font-weight:800; color:var(--cream)}
.close-cta .tg{font-family:var(--disp); font-size:clamp(20px,2.4vw,30px); color:var(--gold-2); font-weight:800}

/* chrome */
.rail{position:fixed; right:20px; top:50%; transform:translateY(-50%); z-index:20; display:flex; flex-direction:column; gap:9px}
.rail button{width:9px; height:9px; padding:0; border:none; border-radius:50%; background:rgba(240,233,216,.25); cursor:pointer; transition:.25s}
.rail button.on{background:var(--gold-2); transform:scale(1.5)}
.topbar{position:fixed; top:0; left:0; right:0; z-index:20; display:flex; justify-content:space-between; align-items:center;
  padding:16px clamp(20px,4vw,40px); font-size:11px; letter-spacing:.12em; color:var(--cream-faint); text-transform:uppercase; pointer-events:none; font-weight:600}
.progress{position:fixed; top:0; left:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--peach)); z-index:21; transition:width .25s; border-radius:0 3px 3px 0}
.hint{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:20; font-size:10.5px; letter-spacing:.14em; color:var(--cream-faint); text-transform:uppercase; animation:pulse 2.4s infinite; font-weight:600}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
</style>

const deck=document.getElementById('deck');

function contentSlide(){const cols=[['Карусели','image','Нейросеть рисует весь постер целиком с идеальной кириллицей — уровень агентства. Правило: 2 из 10 — призыв к заявке.'],['Видео / Reels','play','Дешёвый конвейер вирусных роликов (~15 ₽ за ролик) + уникальное видео для Авито, которого нет ни у кого в РФ. Аккаунт перезапускаю.'],['Лид-воронка','funnel','Путь из соцсетей: комментарий → квиз → расчёт → заявка в CRM. Спроектирована под ключ.'],['Фирменный стиль','sparkle','Единый узнаваемый бренд: логотип, цвета, шрифты. Сайт, Авито, карточки, карусели — как один бренд.']];return `<div class="wrap">${head('11','Контент + бренд','Контент, который качает бренд и лицо клиента')}<div class="dash" style="grid-template-columns:repeat(4,1fr)">${cols.map((c,i)=>`<div class="card t${i%3} rv" style="--i:${i+2}">${icon(c[1])}<div class="cn">${esc(c[0])}</div><div class="cd">${esc(c[2])}</div></div>`).join('')}</div><div class="note accent rv" style="--i:6"><div class="tag">СУТЬ</div><div class="txt">Задача контента — не подписчики, а сильный бренд и узнаваемое лицо клиента. Трендовые Reels и карусели делают из подрядчика того, кому доверяют.</div></div></div>`;}

const R={title:titleSlide,dashboard:dashboardSlide,timeline:timelineSlide,deal:dealSlide,content:contentSlide,infra:infraSlide,honest:honestSlide,closing:closingSlide};
SLIDES.forEach(s=>{const sec=document.createElement('section');sec.className='slide';sec.innerHTML=(s.type==='ba')?baSlide(s):(s.type==='levers')?leversSlide(s):R[s.type]();deck.appendChild(sec);});

const slides=[...document.querySelectorAll('.slide')];
const rail=document.getElementById('rail');
slides.forEach((_,i)=>{const b=document.createElement('button');b.onclick=()=>slides[i].scrollIntoView();rail.appendChild(b);});
const dots=[...rail.children], counter=document.getElementById('counter'), prog=document.getElementById('prog'), pad=n=>String(n).padStart(2,'0');
const fmt=(v,d)=>v.toLocaleString('ru-RU',{minimumFractionDigits:d,maximumFractionDigits:d});
function countUp(el){if(el.dataset.done)return;el.dataset.done=1;const t=parseFloat(el.dataset.count),d=+(el.dataset.dec||0),s=el.dataset.suf||'';if(matchMedia('(prefers-reduced-motion:reduce)').matches){el.textContent=fmt(t,d)+s;return;}const dur=1050,t0=performance.now();(function tick(now){const p=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-p,3);el.textContent=fmt(t*e,d)+s;if(p<1)requestAnimationFrame(tick);else el.textContent=fmt(t,d)+s;})(t0);}
const io=new IntersectionObserver((es)=>{es.forEach(e=>{const i=slides.indexOf(e.target);if(e.isIntersecting&&e.intersectionRatio>.55){e.target.classList.add('active');dots.forEach((d,j)=>d.classList.toggle('on',j===i));counter.textContent=pad(i+1)+' / '+pad(slides.length);prog.style.width=((i+1)/slides.length*100)+'%';e.target.querySelectorAll('[data-count]').forEach(countUp);}});},{threshold:[.55]});
slides.forEach(s=>io.observe(s));
let idx=0;const go=d=>{idx=Math.max(0,Math.min(slides.length-1,idx+d));slides[idx].scrollIntoView();};
addEventListener('keydown',e=>{if(['ArrowDown','ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();go(1);}if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(-1);}});
addEventListener('scroll',()=>{const c=innerHeight/2;slides.forEach((s,i)=>{const r=s.getBoundingClientRect();if(r.top<=c&&r.bottom>=c)idx=i;});},{passive:true});
</script>
